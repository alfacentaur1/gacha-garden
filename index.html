<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Garden gacha game</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <header>
    <h1>Garden gacha game</h1>
  </header>

  <main class="layout">
    <aside class="dashboard">
      <p>Gardeners electronic diary</p>
      <div class="statistics">
        <p>Statistics</p>
        <div class="stat-item">Money: $100</div>
        <div class="stat-item">Lemonade sold: 50</div>
        <div class="stat-item">Money made: $250</div>
      </div>
      <div class="nav">
        <p>seed shop and lexicon</p>
      </div>
      <div class="trader">
            <p>trader</p>
            <img src="img/trader.png" alt="trader-img">
            <div class="trader-container">
            <div class="trader-item"></div>
            <div class="trader-item"></div>
            <div class="trader-item"></div>
            </div>
      </div>
      <div class="lemonstand">
        <p>click to sell lemonade</p>
        <img src="/img/lemonstand.png" alt="Lemon stand">
      </div>

    </aside>

    <section class="fields-container">
      <article class="field">
        <div class="plot"></div>
            <div class="plot"></div>
            <div class="plot"></div>
            <div class="plot"></div>
            <div class="plot"></div>
            <div class="plot"></div>
            <div class="plot"></div>
            <div class="plot"></div>
            <div class="plot"></div>
      </article>
      <article class="field">
        <div class="plot"></div>
            <div class="plot"></div>
            <div class="plot"></div>
            <div class="plot"></div>
            <div class="plot"></div>
            <div class="plot"></div>
            <div class="plot"></div>
            <div class="plot"></div>
            <div class="plot"></div>
      </article>
    </section>

    <section class="weather-forecast">
      <p>Weather forecast</p>
      <div class="weather-container">
        <div class="weather-icon">☀️</div>
        <div class="weather-info">
        <span class="weather-type">Sunny</span>
        <span class="weather-perk">+20% crop growth</span>
        </div>
    </section>

    <section class="seeds">
      <p>Seeds</p>
      <div class="seed-container">
        <div class="seed"></div>
        <div class="seed"></div>
        <div class="seed"></div>
        <div class="seed"></div>
        <div class="seed"></div>
        <div class="seed"></div>
      </div>
    </section>

    <div class="right-bottom">
  <section class="tools">
    <p>Tools</p>
    <div class="tools-container">
      <div class="tool"></div>
      <div class="tool"></div>
      <div class="tool"></div>
    </div>
  </section>
  <section class="input-section">
    <p>What's your name, gardener?</p>
    <input type="text" placeholder="John Smith">
    <button class="save-name">Save</button>
  </section>
</div>
  </main>
</body>
</html>
